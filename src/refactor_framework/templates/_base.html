<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Refactor Report{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background: #f8fafc;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #0f172a; }
        h2 { font-size: 1.25rem; margin: 2rem 0 1rem; color: #334155; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        h3 { font-size: 1rem; margin: 1.5rem 0 0.75rem; color: #475569; }

        .header { margin-bottom: 2rem; }
        .header .subtitle { color: #64748b; font-size: 0.9rem; }
        .badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
        }
        .badge-planned { background: #dbeafe; color: #1d4ed8; }
        .badge-spec_generated { background: #e0e7ff; color: #4338ca; }
        .badge-spec_approved { background: #c7d2fe; color: #3730a3; }
        .badge-executing { background: #fef3c7; color: #d97706; }
        .badge-reported { background: #d1fae5; color: #059669; }
        .badge-methodology { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
        .badge-archived { background: #e2e8f0; color: #475569; }

        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .card {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #bae6fd; border-radius: 8px;
            padding: 1.25rem; text-align: center;
        }
        .card .value { font-size: 1.5rem; font-weight: 700; color: #0c4a6e; }
        .card .label { font-size: 0.8rem; color: #64748b; margin-top: 0.25rem; }
        .card.positive { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border-color: #86efac; }
        .card.positive .value { color: #166534; }
        .card.negative { background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); border-color: #fca5a5; }
        .card.negative .value { color: #991b1b; }

        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
        th { background: #f1f5f9; color: #475569; padding: 0.75rem; text-align: left; font-weight: 600; }
        td { padding: 0.75rem; border-bottom: 1px solid #e2e8f0; }
        tr:hover td { background: #f8fafc; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }
        .delta-pos { color: #16a34a; font-weight: 600; }
        .delta-neg { color: #dc2626; font-weight: 600; }
        .delta-zero { color: #94a3b8; }

        .collapsible { margin: 1rem 0; }
        .collapsible summary {
            cursor: pointer; padding: 0.75rem 1rem; background: #f1f5f9;
            border-radius: 6px; font-weight: 600; color: #334155;
        }
        .collapsible summary:hover { background: #e2e8f0; }
        .collapsible .content { padding: 1rem; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 6px 6px; overflow-x: auto; }

        /* Migration panels */
        .migration-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.75rem; }
        .panel-source, .panel-target { border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
        .panel-source .panel-header { background: #fef2f2; color: #991b1b; padding: 0.5rem 0.75rem; font-size: 0.8rem; font-weight: 600; }
        .panel-target .panel-header { background: #f0fdf4; color: #166534; padding: 0.5rem 0.75rem; font-size: 0.8rem; font-weight: 600; }
        .migration-panel pre { margin: 0; padding: 0.75rem; font-size: 0.75rem; line-height: 1.4; overflow-x: auto; max-height: 400px; overflow-y: auto; background: #fafafa; }
        .annotation-banner { background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; color: #1e40af; font-size: 0.85rem; line-height: 1.5; }

        @media (max-width: 768px) { .migration-panel { grid-template-columns: 1fr; } }

        /* difflib table overrides */
        table.diff { font-size: 0.8rem; font-family: 'Consolas', 'Monaco', monospace; }
        table.diff td { padding: 0.1rem 0.5rem; white-space: pre-wrap; word-break: break-all; }
        .diff_add { background: #dcfce7; }
        .diff_sub { background: #fee2e2; }
        .diff_chg { background: #fef9c3; }
        .diff_header { background: #f1f5f9; }

        .unified-diff pre { font-size: 0.8rem; line-height: 1.4; overflow-x: auto; }
        .diff-add { background: #dcfce7; display: block; }
        .diff-del { background: #fee2e2; display: block; }
        .diff-hunk { color: #6366f1; display: block; }
        .diff-header { color: #64748b; display: block; font-weight: 600; }

        .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 0.75rem; text-align: center; }

        /* Bar chart */
        .bar-chart { margin: 1rem 0; }
        .bar-row { display: flex; align-items: center; margin: 0.3rem 0; }
        .bar-label { width: 120px; font-size: 0.75rem; color: #475569; text-align: right; padding-right: 0.5rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-track { flex: 1; background: #e2e8f0; height: 20px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .bar-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .bar-fill.green { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .bar-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }
        .bar-value { width: 60px; font-size: 0.75rem; color: #64748b; padding-left: 0.5rem; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <div class="footer">
        Generated by refactor_framework v0.1.0 | {{ now if now is defined else "" }}
    </div>
</body>
</html>
